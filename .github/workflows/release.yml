name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  # ─── Create GitHub Release with notes ──────────────────────────────────────
  create-release:
    name: Create Release with Notes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for changelog generation

      - name: Generate release notes from commits
        id: notes
        run: |
          # Find previous tag
          PREV_TAG=$(git tag --sort=-v:refname | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi
          echo "Previous tag: $PREV_TAG"

          # Generate notes grouped by conventional commit type
          {
            echo "NOTES<<EOF"

            # Features
            FEATS=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --grep="^feat" --extended-regexp | grep -v "^$" || true)
            if [ -n "$FEATS" ]; then
              echo "### ✨ Features"
              echo ""
              echo "$FEATS"
              echo ""
            fi

            # Bug fixes
            FIXES=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --grep="^fix" --extended-regexp | grep -v "^$" || true)
            if [ -n "$FIXES" ]; then
              echo "### 🐛 Bug Fixes"
              echo ""
              echo "$FIXES"
              echo ""
            fi

            # Docs
            DOCS=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --grep="^docs" --extended-regexp | grep -v "^$" || true)
            if [ -n "$DOCS" ]; then
              echo "### 📝 Documentation"
              echo ""
              echo "$DOCS"
              echo ""
            fi

            # Other (refactor, chore, ci, etc.)
            OTHERS=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --grep="^feat\|^fix\|^docs\|^release" --invert-grep --extended-regexp | grep -v "^$" || true)
            if [ -n "$OTHERS" ]; then
              echo "### 🔧 Other Changes"
              echo ""
              echo "$OTHERS"
              echo ""
            fi

            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.notes.outputs.NOTES }}
          draft: false
          prerelease: false

  # ─── Meet App: Windows x64 Installer ──────────────────────────────────────
  meet-app-windows:
    needs: create-release
    name: Meet App — Windows x64 Setup
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Rebuild better-sqlite3 for Electron
        working-directory: packages/meet-app
        run: npx @electron/rebuild -f -w better-sqlite3 -m ../..

      - name: Build & package
        working-directory: packages/meet-app
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer to release
        uses: softprops/action-gh-release@v2
        with:
          files: packages/meet-app/dist/*.exe

  # ─── Meet App: macOS Installer ─────────────────────────────────────────────
  meet-app-macos:
    needs: create-release
    name: Meet App — macOS DMG
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies (from monorepo root)
        run: npm install --include=optional

      - name: Rebuild better-sqlite3 for Electron
        working-directory: packages/meet-app
        run: npx @electron/rebuild -f -w better-sqlite3 -m ../..

      - name: Build & package
        working-directory: packages/meet-app
        run: npx electron-vite build && npx electron-builder --mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload DMG to release
        uses: softprops/action-gh-release@v2
        with:
          files: packages/meet-app/dist/*.dmg

  # ─── Team App: Docker Images ───────────────────────────────────────────────
  team-app-images:
    needs: create-release
    name: Team App — Docker Images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/team-app/backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/team-backend:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository }}/team-backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/team-app/frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/team-frontend:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository }}/team-frontend:latest
