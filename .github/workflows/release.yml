name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  # ─── Meet App: Windows x64 Installer ──────────────────────────────────────
  meet-app-windows:
    name: Meet App — Windows x64 Setup
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies (from monorepo root)
        run: npm install

      - name: Rebuild better-sqlite3 for Electron
        working-directory: packages/meet-app
        run: npx @electron/rebuild -f -w better-sqlite3 -m ../..

      - name: Build & package
        working-directory: packages/meet-app
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer to release
        uses: softprops/action-gh-release@v2
        with:
          files: packages/meet-app/dist/*.exe

  # ─── Meet App: macOS Installer ─────────────────────────────────────────────
  meet-app-macos:
    name: Meet App — macOS DMG
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies (from monorepo root)
        run: npm install

      - name: Rebuild better-sqlite3 for Electron
        working-directory: packages/meet-app
        run: npx @electron/rebuild -f -w better-sqlite3 -m ../..

      - name: Build & package
        working-directory: packages/meet-app
        run: npx electron-vite build && npx electron-builder --mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload DMG to release
        uses: softprops/action-gh-release@v2
        with:
          files: packages/meet-app/dist/*.dmg

  # ─── Team App: Docker Images ───────────────────────────────────────────────
  team-app-images:
    name: Team App — Docker Images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/team-app/backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/team-backend:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository }}/team-backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/team-app/frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/team-frontend:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository }}/team-frontend:latest
