services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: meetmgr
      POSTGRES_PASSWORD: meetmgr
      POSTGRES_DB: meetmgr
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meetmgr"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://meetmgr:meetmgr@db:5432/meetmgr
      ADMIN_PIN: "${ADMIN_PIN:-314159}"
      RESEND_API_KEY: "${RESEND_API_KEY:-}"
      RESEND_FROM_EMAIL: "${RESEND_FROM_EMAIL:-noreply@example.com}"
      APP_BASE_URL: "${APP_BASE_URL:-http://localhost:8001}"
      SECRET_KEY: "${SECRET_KEY:-change-me-to-a-random-string}"
      STRIPE_API_KEY: "${STRIPE_API_KEY:-}"
      MEET_TEMPLATE: "${MEET_TEMPLATE:-/app/templates/meet.smb}"
      SUPPORT_EMAIL: "${SUPPORT_EMAIL:-}"
      TURNSTILE_SECRET_KEY: "${TURNSTILE_SECRET_KEY:-}"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./templates:/app/templates:ro
      - appdata:/app/data

  frontend:
    build: ./frontend
    environment:
      TURNSTILE_SITE_KEY: "${TURNSTILE_SITE_KEY:-}"
      SUPPORT_EMAIL: "${SUPPORT_EMAIL:-}"
    ports:
      - "8001:80"
    depends_on:
      - backend

volumes:
  pgdata:
  appdata:
