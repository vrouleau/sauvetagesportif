# Default compose — SQLite backend (no external DB needed)
# Usage: docker compose up --build -d
#
# To use PostgreSQL instead:
#   docker compose -f docker-compose.yml -f docker-compose.postgres.yml up --build -d

services:
  backend:
    build:
      context: ../..
      dockerfile: packages/team-app/backend/Dockerfile
    environment:
      ADMIN_PIN: "${ADMIN_PIN:-314159}"
      RESEND_API_KEY: "${RESEND_API_KEY:-}"
      RESEND_FROM_EMAIL: "${RESEND_FROM_EMAIL:-noreply@example.com}"
      APP_BASE_URL: "${APP_BASE_URL:-http://localhost:8001}"
      SECRET_KEY: "${SECRET_KEY:-change-me-to-a-random-string}"
      STRIPE_API_KEY: "${STRIPE_API_KEY:-}"
      SUPPORT_EMAIL: "${SUPPORT_EMAIL:-}"
      TURNSTILE_SECRET_KEY: "${TURNSTILE_SECRET_KEY:-}"
      MEET_TEMPLATE_POOL: "/app/templates/template_pool.lxf"
      MEET_TEMPLATE_BEACH: "/app/templates/template_beach.lxf"
    volumes:
      - appdata:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ../..
      dockerfile: packages/team-app/frontend/Dockerfile
    environment:
      TURNSTILE_SITE_KEY: "${TURNSTILE_SITE_KEY:-}"
      SUPPORT_EMAIL: "${SUPPORT_EMAIL:-}"
    ports:
      - "8001:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  appdata:
