# Production compose — pulls pre-built images, SQLite by default
# Usage: docker compose -f docker-compose.prod.yml up -d
#
# For PostgreSQL: docker compose -f docker-compose.prod.yml -f docker-compose.postgres.yml up -d
#
# Requires .env file with secrets (ADMIN_PIN, SECRET_KEY, etc.)

services:
  backend:
    image: ghcr.io/vrouleau/sauvetagesportif/team-backend:latest
    environment:
      ADMIN_PIN: "${ADMIN_PIN}"
      RESEND_API_KEY: "${RESEND_API_KEY:-}"
      RESEND_FROM_EMAIL: "${RESEND_FROM_EMAIL:-noreply@example.com}"
      APP_BASE_URL: "${APP_BASE_URL:-http://localhost:8001}"
      SECRET_KEY: "${SECRET_KEY}"
      STRIPE_API_KEY: "${STRIPE_API_KEY:-}"
      SUPPORT_EMAIL: "${SUPPORT_EMAIL:-}"
      TURNSTILE_SECRET_KEY: "${TURNSTILE_SECRET_KEY:-}"
    volumes:
      - appdata:/app/data
    restart: unless-stopped

  frontend:
    image: ghcr.io/vrouleau/sauvetagesportif/team-frontend:latest
    environment:
      TURNSTILE_SITE_KEY: "${TURNSTILE_SITE_KEY:-}"
      SUPPORT_EMAIL: "${SUPPORT_EMAIL:-}"
    ports:
      - "8001:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  appdata:
